on:
  push:

name: Test makepkg on ubuntu

jobs:
  hello:
    matrix:
      - aur_repo:
      - aur_repo: -bin
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - run: |
          pacman --noconfirm -Syu
          pacman --noconfirm -S base-devel sudo git wget rust
          useradd -m build
          git clone --branch ${{ github.ref_name }} ${{ github.server_url }}/${{ github.repository }} fixit
          chown -R build fixit
          cd fixit
          sudo -u build ./packaging/aur${{ matrix.aur_repo }}.sh v0.3.1-beta
          cat PKGBUILD
          cat .SRCINFO
