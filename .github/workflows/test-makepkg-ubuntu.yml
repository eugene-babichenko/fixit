on:
  push:

name: Test makepkg on ubuntu

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/arch-build.dockerfile
          push: true
          tag: latest
  hello:
    runs-on: ubuntu-latest
    needs: build_docker
    container:
      image: ghcr.io/eugene-babichenko/fixit
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt update && sudo apt install -y makepkg && ./packaging/aur.sh v0.3.1-beta
